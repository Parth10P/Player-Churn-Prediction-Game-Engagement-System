# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ChurnGuard CI/CD Pipeline
#  Runs on every push to main & every PR targeting main
#  All jobs must pass before code can be merged
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────
#  JOB 1 — Lint & Code Quality (Python)
# ─────────────────────────────────────────────
jobs:
  lint-python:
    name: 🔍 Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install flake8

      - name: Syntax & import errors (fatal)
        run: flake8 backend/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Code style warnings (non-fatal)
        run: flake8 backend/ tests/ --count --exit-zero --max-complexity=12 --max-line-length=127 --statistics

      - name: Compile Python files
        run: python -m compileall backend tests

  # ─────────────────────────────────────────────
  #  JOB 2 — Train Model
  # ─────────────────────────────────────────────
  train-model:
    name: 🧠 Train Model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Train ML model
        run: python -m backend.ml.train

      - name: Verify model artifacts exist
        run: |
          test -f backend/models/churn_model.pkl    || (echo "❌ churn_model.pkl missing" && exit 1)
          test -f backend/models/scaler.pkl         || (echo "❌ scaler.pkl missing" && exit 1)
          test -f backend/models/label_encoders.pkl || (echo "❌ label_encoders.pkl missing" && exit 1)
          test -f backend/models/feature_names.pkl  || (echo "❌ feature_names.pkl missing" && exit 1)
          echo "✅ All 4 model artifacts created"

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: backend/models/
          retention-days: 1

  # ─────────────────────────────────────────────
  #  JOB 3 — Backend Tests (needs trained model)
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: train-model
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest httpx

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Verify imports work
        run: |
          python -c "import backend; print('backend imported ok')"
          python -c "from backend.agent.workflow import create_agent_workflow; print('agent import ok')"
          python -c "from backend.main import app; print('main import ok')"

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: _artifacts/

      - name: Place model artifacts into backend/models
        run: |
          mkdir -p backend/models
          # Handle both flat and nested artifact structures
          if ls _artifacts/*.pkl >/dev/null 2>&1; then
            mv _artifacts/* backend/models/
          elif ls _artifacts/backend/models/*.pkl >/dev/null 2>&1; then
            mv _artifacts/backend/models/* backend/models/
          fi
          rm -rf _artifacts

      - name: Verify model artifact layout
        run: |
          ls -la backend/models
          test -f backend/models/churn_model.pkl
          test -f backend/models/scaler.pkl
          test -f backend/models/label_encoders.pkl
          test -f backend/models/feature_names.pkl

      - name: Run preprocess & feature engineering tests
        run: python -m pytest tests/test_preprocess.py tests/test_feature_engineering.py -v --tb=short

      - name: Run agent tests
        run: python -m pytest tests/test_agent.py -v --tb=short

      - name: Run API tests
        run: python -m pytest tests/test_api.py -v --tb=short

      - name: Verify all tests passed
        run: echo "✅ All backend tests passed"

  # ─────────────────────────────────────────────
  #  JOB 4 — Frontend Lint & Build
  # ─────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Clear stale Next cache
        run: rm -rf .next

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npx next build

      - name: Verify build output
        run: |
          test -d .next || (echo "❌ .next build directory missing" && exit 1)
          echo "✅ Frontend build successful"

  # ─────────────────────────────────────────────
  #  JOB 5 — Notebook Execution
  # ─────────────────────────────────────────────
  test-notebook:
    name: 📓 Notebook Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install jupyter nbconvert nbformat ipykernel matplotlib seaborn

      - name: Check if notebook exists
        id: check-notebook
        run: |
          if [ -f "notebooks/exploration.ipynb" ]; then
            echo "notebook_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Found notebooks/exploration.ipynb"
          else
            echo "notebook_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  notebooks/exploration.ipynb not found - skipping notebook execution"
          fi

      - name: Execute notebook
        if: steps.check-notebook.outputs.notebook_exists == 'true'
        run: |
          python -m ipykernel install --user --name python3 --display-name "Python 3"
          jupyter nbconvert --to notebook --execute notebooks/exploration.ipynb \
            --ExecutePreprocessor.timeout=120 \
            --ExecutePreprocessor.kernel_name=python3 \
            --output executed_exploration.ipynb

      - name: Verify notebook executed
        if: steps.check-notebook.outputs.notebook_exists == 'true'
        run: echo "✅ Notebook executed without errors"

  # ─────────────────────────────────────────────
  #  JOB 6 — Final Gate (all checks must pass)
  # ─────────────────────────────────────────────
  ci-passed:
    name: ✅ All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-python, train-model, test-backend, build-frontend, test-notebook]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.lint-python.result }}" != "success" ]; then
            echo "❌ Python linting failed"
            exit 1
          fi
          if [ "${{ needs.train-model.result }}" != "success" ]; then
            echo "❌ Model training failed"
            exit 1
          fi
          if [ "${{ needs.test-backend.result }}" != "success" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.build-frontend.result }}" != "success" ]; then
            echo "❌ Frontend build failed"
            exit 1
          fi
          # Notebook job is optional - skip if not present (notebook doesn't exist in repo)
          if [ "${{ needs.test-notebook.result }}" = "failure" ]; then
            echo "❌ Notebook execution failed"
            exit 1
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All CI checks passed!"
          echo "   Safe to merge into main"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
